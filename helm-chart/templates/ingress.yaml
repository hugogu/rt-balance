apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: real-balance-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # For AWS or GCP
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: localhost
      http:
        paths:
          - path: /account
            pathType: Prefix
            backend:
              service:
                name: account-service
                port:
                  number: 8080
          - path: /transaction
            pathType: Prefix
            backend:
              service:
                name: transaction-service
                port:
                  number: 8080
